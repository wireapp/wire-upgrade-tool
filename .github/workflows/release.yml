name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Update README install URLs
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          WHL="wire_upgrade-${VERSION}-py3-none-any.whl"
          BASE="https://github.com/wireapp/wire-upgrade-tool/releases/download/${TAG}"
          sed -i "s|releases/download/v[0-9][0-9.]*\/wire_upgrade-[0-9][0-9.]*-py3-none-any\.whl|releases/download/${TAG}/${WHL}|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update install URLs to ${TAG}"
          git push origin HEAD:main

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*.whl
